{% extends "base.html" %}

{% block title %}404 - Page Not Found- {{ brand_name }}{% endblock %}

{% block content %}
<div class="container py-5 text-center"
    style="min-height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
    <div class="glass-card p-5" style="max-width: 600px; width: 100%; border-radius: 20px;">
        <div class="mb-4 text-primary">
            <i class="fas fa-compass fa-5x" style="opacity: 0.8;"></i>
        </div>
        <h1 class="display-4 font-weight-bold mb-3" style="font-size: 3rem;">404</h1>
        <h2 class="h4 mb-4">Looks like you're lost!</h2>
        <p class="text-muted mb-5">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="{{ url_for('pages_bp.home') }}" class="btn btn-primary px-4 py-2" style="border-radius: 50px;">
                <i class="fas fa-home mr-2"></i> Go Home
            </a>
            <a href="{{ url_for('shop_bp.shop') }}" class="btn btn-outline-primary px-4 py-2"
                style="border-radius: 50px; margin-left: 10px;">
                <i class="fas fa-shopping-bag mr-2"></i> Shop Now
            </a>
        </div>
    </div>
</div>
{% endblock %}
