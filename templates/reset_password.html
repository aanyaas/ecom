{% extends "base.html" %}

{% block title %}Reset Password - {{ company_name }}{% endblock %}

{% block styles %}
{{ super() }}
<style>
    .auth-container {
        padding: 80px 0 100px;
        background: #fff;
    }

    .auth-card {
        background: #fff;
        border-radius: 30px;
        border: 1px solid #f0f0f0;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.04);
        overflow: hidden;
    }

    .auth-card-header {
        background: #fdfcfd;
        padding: 40px;
        text-align: center;
        border-bottom: 1px solid #f0f0f0;
    }

    .auth-card-header h2 {
        font-family: 'Playfair Display', serif;
        font-weight: 700;
        margin-bottom: 0;
        color: #1a1a1a;
    }

    .auth-card-body {
        padding: 50px;
    }

    .form-label-luxury {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: #999;
        font-weight: 700;
        margin-bottom: 10px;
        display: block;
    }

    .form-control-luxury {
        border: 1px solid #f0f0f0;
        border-radius: 12px;
        padding: 12px 20px;
        height: 50px;
        font-size: 0.95rem;
        transition: all 0.3s;
    }

    .form-control-luxury:focus {
        border-color: #a64d79;
        box-shadow: 0 10px 30px rgba(166, 77, 121, 0.05);
    }

    .btn-auth {
        background: #1a1a1a;
        color: #fff;
        padding: 18px;
        border-radius: 50px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        font-size: 0.85rem;
        border: none;
        transition: all 0.3s;
        margin-top: 20px;
    }

    .btn-auth:hover {
        background: #a64d79;
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(166, 77, 121, 0.2);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6" data-reveal="bottom">
                <div class="auth-card">
                    <div class="auth-card-header">
                        <h2>Reset Password</h2>
                    </div>
                    <div class="auth-card-body">
                        <p class="text-center text-muted mb-4">Reset password for <strong>{{ email }}</strong></p>
                        <form method="POST">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                            <input type="hidden" name="token" value="{{ token }}"/>
                            
                            <div class="form-group mb-4">
                                <label class="form-label-luxury" for="password">New Password</label>
                                <input type="password" id="password" name="password" class="form-control form-control-luxury" placeholder="Enter new password (min 8 characters)" required minlength="8">
                            </div>
                            
                            <div class="form-group mb-4">
                                <label class="form-label-luxury" for="confirm_password">Confirm New Password</label>
                                <input type="password" id="confirm_password" name="confirm_password" class="form-control form-control-luxury" placeholder="Confirm new password" required minlength="8">
                            </div>
                            
                            <button type="submit" class="btn btn-auth btn-block">
                                <i class="fas fa-key mr-2"></i> Reset Password
                            </button>

                            <div class="text-center mt-4">
                                <a href="{{ url_for('pages_bp.home') }}" class="text-muted small text-uppercase font-weight-bold" style="letter-spacing: 1px;">Cancel & Return Home</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
