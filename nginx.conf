# Production-Grade Nginx Server Block for Aanyaas Enterprises
# Secure reverse proxy configuration mapping port 80/443 to Gunicorn WSGI running on 127.0.0.1:5000

upstream gunicorn_backend {
    server 127.0.0.1:5000 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name aanyaasenterprises.com www.aanyaasenterprises.com;

    # Enforce SSL redirection in production
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name aanyaasenterprises.com www.aanyaasenterprises.com;

    # SSL Certificate Settings (Paths managed via Certbot Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/aanyaasenterprises.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aanyaasenterprises.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Dynamic Gzip Compression for Optimal Page Speed (Core Web Vitals)
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript
        image/svg+xml;

    # Security Headers (Defend against Clickjacking, MIME spoofing, and XSS)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' https://fonts.googleapis.com https://fonts.gstatic.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://ka-f.fontawesome.com; img-src 'self' data: https:; font-src 'self' https: data:; frame-src https://*.phonepe.com;" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Direct routing for static resources (offloads asset delivery from Gunicorn)
    location /static/ {
        alias /var/www/ecom/static/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
        access_log off;
    }

    # Main application route proxy binding
    location / {
        proxy_pass http://gunicorn_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Standard timeouts to protect backend from slow connection exhaustion
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Block access to .env and hidden configuration details
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Restrict direct access to JSON config files
    location ~* \.json$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}
